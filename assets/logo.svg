<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- F letter stylized -->
  <g>
    <!-- F Icon mark -->
    <rect x="2" y="8" width="4" height="34" rx="2" fill="#1e4d8c"/>
    <rect x="2" y="8" width="20" height="4" rx="2" fill="#1e4d8c"/>
    <rect x="2" y="23" width="16" height="4" rx="2" fill="#2d73d4"/>
    <!-- Blue/teal accent dot -->
    <circle cx="26" cy="10" r="5" fill="url(#logo-grad)"/>
    <defs>
      <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a9e8f"/>
        <stop offset="100%" stop-color="#1e88e5"/>
      </linearGradient>
    </defs>
  </g>
  <!-- FAHIM text -->
  <text x="38" y="34" font-family="Cairo, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="1" fill="#1e4d8c">FAHIM</text>
</svg>
